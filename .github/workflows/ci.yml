name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven/setup-bun@v1
        with:
          bun-version: 1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run --cwd packages/core typecheck

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb-ha:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sudowork_qms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven/setup-bun@v1
        with:
          bun-version: 1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: sudowork_qms_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-secret-key
          NODE_ENV: test

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven/setup-bun@v1
        with:
          bun-version: 1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build admin frontend
        run: bun run --cwd packages/admin build

      - name: Build core backend
        run: bun build packages/core/src/index.ts --outdir ./packages/core/dist --target bun

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            packages/core/dist
            packages/admin/dist
          retention-days: 7